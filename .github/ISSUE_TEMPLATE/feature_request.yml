name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Groups & Sessions
        - Items & Tags
        - Collections
        - Search
        - AI Agent
        - Import / Export
        - Integrations (Slack, Discord, etc.)
        - Webhooks
        - MCP Endpoint
        - Browser Extension
        - Authentication
        - UI / UX
        - Docker / Deployment
        - API
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any mockups, screenshots, or references.
